<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="white"/>
  
  <!-- Root: Memory -->
  <rect x="250" y="20" width="100" height="40" rx="5" fill="#bbdefb" stroke="black" stroke-width="2"/>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Memory</text>
  
  <!-- RAM and ROM Branches -->
  <line x1="300" y1="60" x2="300" y2="80" stroke="black" stroke-width="2"/>
  <line x1="150" y1="80" x2="450" y2="80" stroke="black" stroke-width="2"/>
  
  <line x1="150" y1="80" x2="150" y2="100" stroke="black" stroke-width="2"/>
  <line x1="450" y1="80" x2="450" y2="100" stroke="black" stroke-width="2"/>
  
  <!-- RAM -->
  <rect x="100" y="100" width="100" height="40" rx="5" fill="#c8e6c9" stroke="black" stroke-width="2"/>
  <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">RAM</text>
  <text x="150" y="135" text-anchor="middle" font-family="Arial" font-size="10">(Volatile)</text>
  
  <!-- ROM -->
  <rect x="400" y="100" width="100" height="40" rx="5" fill="#ffecb3" stroke="black" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">ROM</text>
  <text x="450" y="135" text-anchor="middle" font-family="Arial" font-size="10">(Non-Volatile)</text>
  
  <!-- RAM Sub-types -->
  <line x1="150" y1="140" x2="150" y2="160" stroke="black" stroke-width="2"/>
  <line x1="100" y1="160" x2="200" y2="160" stroke="black" stroke-width="2"/>
  <line x1="100" y1="160" x2="100" y2="180" stroke="black" stroke-width="2"/>
  <line x1="200" y1="160" x2="200" y2="180" stroke="black" stroke-width="2"/>
  
  <text x="100" y="200" text-anchor="middle" font-family="Arial" font-size="12">SRAM</text>
  <text x="200" y="200" text-anchor="middle" font-family="Arial" font-size="12">DRAM</text>
  
  <!-- ROM Sub-types -->
  <line x1="450" y1="140" x2="450" y2="160" stroke="black" stroke-width="2"/>
  <line x1="300" y1="160" x2="580" y2="160" stroke="black" stroke-width="2"/>
  
  <!-- ROM, PROM, EPROM, EEPROM, Flash -->
  <line x1="300" y1="160" x2="300" y2="180" stroke="black" stroke-width="2"/>
  <line x1="370" y1="160" x2="370" y2="180" stroke="black" stroke-width="2"/>
  <line x1="440" y1="160" x2="440" y2="180" stroke="black" stroke-width="2"/>
  <line x1="510" y1="160" x2="510" y2="180" stroke="black" stroke-width="2"/>
  <line x1="580" y1="160" x2="580" y2="180" stroke="black" stroke-width="2"/>
  
  <text x="300" y="200" text-anchor="middle" font-family="Arial" font-size="12">Mask ROM</text>
  <text x="370" y="200" text-anchor="middle" font-family="Arial" font-size="12">PROM</text>
  <text x="440" y="200" text-anchor="middle" font-family="Arial" font-size="12">EPROM</text>
  <text x="510" y="200" text-anchor="middle" font-family="Arial" font-size="12">EEPROM</text>
  <text x="580" y="200" text-anchor="middle" font-family="Arial" font-size="12">Flash</text>
</svg>
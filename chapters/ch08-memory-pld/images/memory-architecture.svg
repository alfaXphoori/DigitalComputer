<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Address Bus -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Address Bus (n bits)</text>
  <line x1="200" y1="40" x2="200" y2="70" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Address Decoder -->
  <rect x="100" y="70" width="200" height="60" fill="#f9f9f9" stroke="black" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" font-family="Arial" font-size="14">Address</text>
  <text x="200" y="115" text-anchor="middle" font-family="Arial" font-size="14">Decoder (n → 2ⁿ)</text>
  
  <!-- Memory Array -->
  <rect x="100" y="130" width="200" height="120" fill="#e1f5fe" stroke="black" stroke-width="2"/>
  <text x="200" y="190" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Memory Array</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="14">(Storage)</text>
  <text x="310" y="190" font-family="Arial" font-size="12">2ⁿ × m bits</text>
  
  <!-- I/O Buffers -->
  <rect x="100" y="250" width="200" height="40" fill="#f9f9f9" stroke="black" stroke-width="2"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial" font-size="14">I/O Buffers</text>
  
  <!-- Control Signals -->
  <line x1="40" y1="160" x2="100" y2="160" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="35" y="165" text-anchor="end" font-family="Arial" font-size="14" font-weight="bold">CS</text>
  
  <line x1="40" y1="190" x2="100" y2="190" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="35" y="195" text-anchor="end" font-family="Arial" font-size="14" font-weight="bold">R/W̄</text>
  
  <line x1="40" y1="220" x2="100" y2="220" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="35" y="225" text-anchor="end" font-family="Arial" font-size="14" font-weight="bold">OE</text>
  
  <!-- Data Bus -->
  <line x1="200" y1="290" x2="200" y2="330" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <text x="200" y="350" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Data Bus (m bits)</text>
  
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Outer Frame -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- I/O Blocks (Top) -->
  <rect x="40" y="30" width="40" height="20" fill="#ffccbc" stroke="black"/>
  <rect x="110" y="30" width="40" height="20" fill="#ffccbc" stroke="black"/>
  <rect x="180" y="30" width="40" height="20" fill="#ffccbc" stroke="black"/>
  <rect x="250" y="30" width="40" height="20" fill="#ffccbc" stroke="black"/>
  <rect x="320" y="30" width="40" height="20" fill="#ffccbc" stroke="black"/>
  <text x="200" y="25" text-anchor="middle" font-family="Arial" font-size="10">IOB (Input/Output Blocks)</text>

  <!-- CLBs (Configurable Logic Blocks) -->
  <rect x="80" y="80" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="110" y="115" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="170" y="80" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="260" y="80" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="290" y="115" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="80" y="170" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="110" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="170" y="170" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="260" y="170" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="290" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>

  <rect x="80" y="260" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="110" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="170" y="260" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>
  
  <rect x="260" y="260" width="60" height="60" fill="#e1f5fe" stroke="black"/>
  <text x="290" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">CLB</text>

  <!-- Programmable Interconnect (Vertical Lines) -->
  <line x1="60" y1="50" x2="60" y2="350" stroke="#757575" stroke-dasharray="4"/>
  <line x1="155" y1="50" x2="155" y2="350" stroke="#757575" stroke-dasharray="4"/>
  <line x1="245" y1="50" x2="245" y2="350" stroke="#757575" stroke-dasharray="4"/>
  <line x1="340" y1="50" x2="340" y2="350" stroke="#757575" stroke-dasharray="4"/>
  
  <!-- Programmable Interconnect (Horizontal Lines) -->
  <line x1="40" y1="65" x2="360" y2="65" stroke="#757575" stroke-dasharray="4"/>
  <line x1="40" y1="155" x2="360" y2="155" stroke="#757575" stroke-dasharray="4"/>
  <line x1="40" y1="245" x2="360" y2="245" stroke="#757575" stroke-dasharray="4"/>
  <line x1="40" y1="340" x2="360" y2="340" stroke="#757575" stroke-dasharray="4"/>
  
  <text x="200" y="375" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Programmable Interconnect</text>
</svg>